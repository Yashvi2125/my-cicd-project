name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📊 Show Node Version
        run: node -v

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🧪 Run Tests
        run: npm test

  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-cicd-app:latest .

      - name: 🚀 Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-cicd-app:latest

      - name: 🏷️ Tag with Commit SHA
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/my-cicd-app:latest \
          ${{ secrets.DOCKER_USERNAME }}/my-cicd-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/my-cicd-app:${{ github.sha }}